<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusCreative – Logo Médico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    gap: 60px;
    padding: 40px;
  }

  h2 {
    color: #4a7fd4;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ===== LOGO CARD ===== */
  .logo-card {
    background: linear-gradient(135deg, #0A1628 0%, #0D2040 100%);
    border: 1px solid rgba(0,201,255,0.15);
    border-radius: 20px;
    padding: 50px 60px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,102,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 40px;
  }

  /* Grid overlay */
  .logo-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,201,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,255,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  /* ===== ICON AREA ===== */
  .icon-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    flex-shrink: 0;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, #00C9FF, #0066FF) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spin 8s linear infinite;
    box-shadow: 0 0 20px rgba(0,201,255,0.4), 0 0 60px rgba(0,102,255,0.2);
  }

  .ring-outer {
    inset: -8px;
    border: 1px solid rgba(0,201,255,0.15);
    animation: spin 12s linear infinite reverse;
    border-radius: 50%;
    position: absolute;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .icon-inner {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(0,201,255,0.15), rgba(0,102,255,0.05));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Medical cross */
  .cross {
    position: relative;
    width: 36px;
    height: 36px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
  }
  .cross::before, .cross::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 3px;
  }
  .cross::before {
    width: 10px; height: 36px;
    top: 0; left: 13px;
  }
  .cross::after {
    width: 36px; height: 10px;
    top: 13px; left: 0;
  }

  /* DNA dots */
  .dna-dots {
    position: absolute;
    inset: 0;
  }
  .dot {
    position: absolute;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .dot.left { background: #00C9FF; box-shadow: 0 0 8px #00C9FF; }
  .dot.right { background: #0066FF; box-shadow: 0 0 8px #0066FF; }

  @keyframes pulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ECG line */
  .ecg-container {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    height: 20px;
    overflow: hidden;
  }
  .ecg-line {
    stroke: url(#ecgGrad);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: ecgDash 2s linear infinite;
    stroke-dasharray: 80;
    stroke-dashoffset: 80;
    filter: drop-shadow(0 0 3px rgba(0,201,255,0.8));
  }
  @keyframes ecgDash {
    to { stroke-dashoffset: -80; }
  }

  /* ===== TEXT AREA ===== */
  .text-area {
    position: relative;
    z-index: 1;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -1px;
    display: flex;
    flex-direction: column;
  }

  .brand-part-1 {
    color: #FFFFFF;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
  }

  .brand-part-2 {
    background: linear-gradient(90deg, #00C9FF, #0066FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 15px rgba(0,201,255,0.5));
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,201,255,0.5), transparent);
    margin: 10px 0;
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 5px;
    color: #00C9FF;
    opacity: 0.65;
    text-transform: uppercase;
  }

  /* ===== VARIANTS SECTION ===== */
  .variants {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .variant {
    background: #0A1628;
    border-radius: 14px;
    padding: 30px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid rgba(0,201,255,0.1);
    min-width: 220px;
  }

  /* Small icon for variants */
  .icon-sm {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(0,201,255,0.15), rgba(0,102,255,0.1));
    border: 1px solid rgba(0,201,255,0.3);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px rgba(0,201,255,0.15);
    flex-shrink: 0;
  }

  .cross-sm {
    position: relative;
    width: 18px; height: 18px;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.7));
  }
  .cross-sm::before, .cross-sm::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 2px;
  }
  .cross-sm::before { width: 5px; height: 18px; top: 0; left: 6.5px; }
  .cross-sm::after  { width: 18px; height: 5px; top: 6.5px; left: 0; }

  .text-sm .n1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .text-sm .n2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(90deg, #00C9FF, #0066FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .text-sm .tag {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 3px;
    color: #00C9FF;
    opacity: 0.6;
    margin-top: 4px;
  }

  /* Dark on white variant */
  .variant.light {
    background: #F0F4FF;
    border-color: rgba(0,102,255,0.15);
  }
  .variant.light .icon-sm {
    background: linear-gradient(135deg, rgba(0,102,255,0.12), rgba(0,201,255,0.08));
    border-color: rgba(0,102,255,0.25);
  }
  .variant.light .cross-sm::before,
  .variant.light .cross-sm::after { background: #0D2040; }
  .variant.light .n1 { color: #0D2040; }
  .variant.light .tag { color: #0066FF; }
</style>
</head>
<body>

<h2>NexusCreative — Brand Identity · Medical SaaS</h2>

<!-- Main Logo -->
<div class="logo-card">
  <div class="icon-wrap">
    <div class="ring-outer"></div>
    <div class="ring"></div>
    <div class="icon-inner">
      <div class="cross"></div>
    </div>

    <!-- DNA dots positioned absolutely -->
    <svg class="dna-dots" viewBox="0 0 110 110">
      <defs>
        <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#00C9FF;stop-opacity:0"/>
          <stop offset="50%" style="stop-color:#00C9FF"/>
          <stop offset="100%" style="stop-color:#00C9FF;stop-opacity:0"/>
        </linearGradient>
      </defs>
      <!-- Left DNA -->
      <circle cx="26" cy="28" r="4" fill="#00C9FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="26" cy="55" r="4" fill="#00C9FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="26" cy="82" r="4" fill="#00C9FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.6s" repeatCount="indefinite"/></circle>
      <!-- Right DNA -->
      <circle cx="84" cy="28" r="4" fill="#0066FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="84" cy="55" r="4" fill="#0066FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.8s" repeatCount="indefinite"/></circle>
      <circle cx="84" cy="82" r="4" fill="#0066FF" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="1.1s" repeatCount="indefinite"/></circle>
      <!-- DNA bridges -->
      <line x1="26" y1="28" x2="84" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
      <line x1="26" y1="55" x2="84" y2="55" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
      <line x1="26" y1="82" x2="84" y2="82" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/>
      <!-- ECG -->
      <polyline class="ecg-line" points="8,100 18,100 23,90 28,110 33,82 38,100 50,100 56,93 62,107 68,100 102,100"/>
    </svg>
  </div>

  <div class="text-area">
    <div class="brand-name">
      <span class="brand-part-1">Nexus</span>
      <span class="brand-part-2">Creative</span>
    </div>
    <div class="divider"></div>
    <div class="tagline">Clinical Records · SaaS Platform</div>
  </div>
</div>

<!-- Variants -->
<h2>Variantes del logo</h2>
<div class="variants">
  <!-- Compact dark -->
  <div class="variant">
    <div class="icon-sm">
      <div class="cross-sm"></div>
    </div>
    <div class="text-sm">
      <div class="n1">Nexus</div>
      <div class="n2">Creative</div>
      <div class="tag">Clinical Records</div>
    </div>
  </div>

  <!-- Light version -->
  <div class="variant light">
    <div class="icon-sm">
      <div class="cross-sm"></div>
    </div>
    <div class="text-sm">
      <div class="n1">Nexus</div>
      <div class="n2">Creative</div>
      <div class="tag">Clinical Records</div>
    </div>
  </div>
</div>

</body>
</html>
